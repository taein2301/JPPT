app:
  name: "jppt"
  version: "0.1.0"
  debug: false

logging:
  level: "INFO"
  format: "[{time:YYYY-MM-DD HH:mm:ss}][{level}]{message} [{file.name}:{line}]"
  json_logs: false
  rotation: "00:00"
  retention: "10 days"

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  docs_enabled: true
  cors_origins: []
  trusted_hosts:
    - "*"
  root_path: ""
